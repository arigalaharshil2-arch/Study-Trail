name: Build Study Trail Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'metadata.json'
      - '.gitignore'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Application
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify Windows native dependencies
        run: node -e "console.log('Rollup:', require.resolve('@rollup/rollup-win32-x64-msvc')); console.log('LightningCSS:', require.resolve('lightningcss-win32-x64-msvc'));"

      - name: Run automated tests
        run: npm test

      - name: Build Tauri 2 Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: "npm run tauri"
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Study Trail {0}', github.ref_name) || '' }}
          releaseBody: ${{ startsWith(github.ref, 'refs/tags/v') && format('Study Trail Desktop Edition {0} for Windows.', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false

      - name: Upload Windows Installers as Action Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Study-Trail-Windows-Installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: warn
